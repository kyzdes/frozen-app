global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Мониторинг самого Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Мониторинг Docker контейнеров через cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Системные метрики через Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Мониторинг Freezer API
  - job_name: 'freezer-api'
    static_configs:
      - targets: ['172.18.0.1:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s
