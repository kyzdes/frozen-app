version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: freezer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: freezer
      POSTGRES_USER: freezer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c max_connections=20
      -c effective_cache_size=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freezer"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: freezer-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://freezer:${DB_PASSWORD}@postgres:5432/freezer
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PORT: 3000
      HOST: 0.0.0.0
      TRUST_PROXY: "true"
      LOG_LEVEL: info
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
